name: Deploy (Vercel)

on:
  workflow_run:
    workflows: ["Release"]
    types: [completed]
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        type: choice
        options: [dev, staging, prod]
        default: dev

concurrency:
  group: deploy-${{ github.event_name == 'workflow_dispatch' && inputs.environment || 'dev' }}
  cancel-in-progress: false

permissions:
  contents: read

# ─────────────────────────────────────────────────────────
# Required GitHub Secrets (Settings → Secrets → Actions):
#   VERCEL_TOKEN      – từ https://vercel.com/account/tokens
#   VERCEL_ORG_ID     – Team ID trong Vercel Settings → General
#   VERCEL_PROJECT_ID – Project ID trong Vercel Project Settings
# ─────────────────────────────────────────────────────────

jobs:
  deploy-frontend:
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    environment: ${{ github.event_name == 'workflow_dispatch' && inputs.environment || 'dev' }}
    env:
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Resolve Vercel environment
        id: env
        run: |
          INPUT="${{ github.event_name == 'workflow_dispatch' && inputs.environment || 'dev' }}"
          case "$INPUT" in
            prod) echo "vercel_env=production" >> "$GITHUB_OUTPUT" ; echo "prod_flag=--prod" >> "$GITHUB_OUTPUT" ;;
            staging) echo "vercel_env=preview" >> "$GITHUB_OUTPUT" ; echo "prod_flag=" >> "$GITHUB_OUTPUT" ;;
            *) echo "vercel_env=development" >> "$GITHUB_OUTPUT" ; echo "prod_flag=" >> "$GITHUB_OUTPUT" ;;
          esac

      - name: Pull Vercel env
        run: vercel pull --yes --environment=${{ steps.env.outputs.vercel_env }} --token=${{ env.VERCEL_TOKEN }}

      - name: Build with Vercel
        run: vercel build ${{ steps.env.outputs.prod_flag }} --token=${{ env.VERCEL_TOKEN }}

      - name: Deploy to Vercel
        run: vercel deploy --prebuilt ${{ steps.env.outputs.prod_flag }} --token=${{ env.VERCEL_TOKEN }}
